<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
  </defs>

  <!-- Outer Rounded Square Background -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#bagGrad)" />

  <!-- Briefcase Handle -->
  <path d="M 36 34 C 36 24, 64 24, 64 34" fill="none" stroke="url(#handleGrad)" stroke-width="6" stroke-linecap="round" />

  <!-- Briefcase Main Body -->
  <rect x="22" y="34" width="56" height="42" rx="8" fill="#ffffff" />

  <!-- Briefcase Latch / Lock Accent -->
  <rect x="42" y="44" width="16" height="12" rx="3" fill="#2563eb" />
  <circle cx="50" cy="50" r="2.5" fill="#ffffff" />

  <!-- Horizontal Metallic Line Accent -->
  <line x1="22" y1="48" x2="78" y2="48" stroke="#e2e8f0" stroke-width="3" />
</svg>
